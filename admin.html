<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Panelis - Darba Uzskaite</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 40px auto;
            max-width: 1400px;
            background: #fdfdfd; 
            color: #333; 
            padding: 20px; 
            font-size: 14px; 
        }

        .header-top { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        #logoutBtn { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        h2 { color: #1a3025; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 20px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 30px; }
        details.pogas { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; height: fit-content; }
        summary { cursor: pointer; font-weight: bold; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; color: #1a3025; list-style: none; border-radius: 12px; }
        details[open] summary { border-bottom: 1px solid #eee; border-radius: 12px 12px 0 0; }
        
        .settings-content ul { list-style: none; padding: 0; margin: 0; }
        .settings-content li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 15px; 
            border-bottom: 1px solid #eee; 
        }

        /* Ievades lauki sarakstos */
        .add-row { padding: 10px 15px; display: flex; gap: 8px; background: #f8f9fa; }
        .add-row input { flex: 1; padding: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-add { background: #1e7e34; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }

        .delete-btn { 
            background: #ff4d4d; 
            color: white; 
            border: none; 
            padding: 4px 8px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px;
        }

        .temp-pass { 
            font-size: 0.85em; 
            background: #fff3cd; 
            padding: 2px 6px; 
            border-radius: 4px; 
            color: #856404; 
            border: 1px solid #ffeeba;
        }

        .filter-section { background: #fff; border: 1px solid #e0e0e0; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }

        select, button { padding: 6px 10px; border-radius: 6px; border: 1px solid #ced4da; background: white; }
        
        .report-card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .report-card > summary { padding: 15px 25px; background: #1a3025; color: #fff; text-transform: uppercase; list-style: none; cursor: pointer; font-weight: bold; }

        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th { background: #1a3025; color: #c5a059; padding: 12px 5px; text-align: center; font-size: 0.8em; }
        td { padding: 10px 5px; border-bottom: 1px solid #f0f0f0; text-align: center; color: #444; word-wrap: break-word; }
        
        .sum-bar { padding: 15px; background: #fcf9f2; border-bottom: 1px solid #eee; display: flex; justify-content: center; gap: 40px; font-weight: bold; }
        .val-highlight { color: #1e7e34; }
        .oil-val { color: #d4b45d; }
        .fuel-val { color: #b45d5d; }
    </style>
</head>
<body>

    <div class="header-top"><button id="logoutBtn">Izrakstīties</button></div>
    <h2>Admin Vadības Panelis</h2>

    <div class="grid-container">
        <details class="pogas">
            <summary>👷 Darbinieki</summary>
            <div class="settings-content">
                <div class="add-row">
                    <button onclick="window.location.href='register.html'" style="width:100%; background:#007bff; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">+ Reģistrēt jaunu</button>
                </div>
                <ul id="workerList"></ul>
            </div>
        </details>

        <details class="pogas">
            <summary>🚗 Mašīnas</summary>
            <div class="settings-content">
                <div class="add-row">
                    <input type="text" id="newCarName" placeholder="Auto nosaukums...">
                    <button class="btn-add" onclick="addItem('cars', 'newCarName')">+</button>
                </div>
                <ul id="carList"></ul>
            </div>
        </details>

        <details class="pogas">
            <summary>⚒️ Darba veidi</summary>
            <div class="settings-content">
                <div class="add-row">
                    <input type="text" id="newWorkName" placeholder="Darba veids...">
                    <button class="btn-add" onclick="addItem('work-types', 'newWorkName')">+</button>
                </div>
                <ul id="workList"></ul>
            </div>
        </details>

        <details class="pogas">
            <summary>📍 Objekti</summary>
            <div class="settings-content">
                <div class="add-row">
                    <input type="text" id="newObjectName" placeholder="Objekts...">
                    <button class="btn-add" onclick="addItem('objects', 'newObjectName')">+</button>
                </div>
                <ul id="objectList"></ul>
            </div>
        </details>

        <details class="pogas">
            <summary>🛢️ Noliktava (Resursi)</summary>
            <div class="settings-content">
                <div class="add-row">
                    <input type="text" id="newResName" placeholder="Jauns resurss...">
                    <button class="btn-add" onclick="addResource()">+</button>
                </div>
                <ul id="resourceList"></ul>
            </div>
        </details>
    </div>

    <div class="filter-section">
        <h3>Galvenie filtri</h3>
        <div class="filter-row">
            <label>Gads:<br><select id="filterYear"><option value="">Visi</option></select></label>
            <label>Mēnesis:<br><select id="filterMonth"><option value="">Visi</option></select></label>
            <label>Darbinieks:<br><select id="filterWorker"><option value="">Visi</option></select></label>
            <button id="clearFilters">Notīrīt filtrus</button>
        </div>
    </div>

    <div class="report-stack">
        <details class="report-card" open>
            <summary>📋 Darba Gaitas Atskaite</summary>
            <div class="sum-bar"><span>Kopā: <span id="totalHoursValue" class="val-highlight">0.00</span> h</span></div>
            <div id="tableContainer"></div>
        </details>
        
        <details class="report-card" open>
            <summary>⛽ Patēriņš (Eļļa / Degviela)</summary>
            <div class="sum-bar">
                <span>Eļļa: <span id="totalOilValue" class="oil-val">0.00</span> L</span>
                <span>Degviela: <span id="totalFuelValue" class="fuel-val">0.00</span> L</span>
            </div>
            <div id="oilContainer"></div>
        </details>
    </div>

    <script>
    let workers = [], cars = [], schedule = [], works_types = [], objects = [], resourceTypes = [];

    async function loadData() {
        try {
            const [wRes, cRes, sRes, wtRes, oRes, rRes] = await Promise.all([
                fetch('/api/workers'), fetch('/api/cars'), fetch('/api/schedule'),
                fetch('/api/work-types'), fetch('/api/objects'), fetch('/api/resource-types')
            ]);
            
            workers = await wRes.json();
            cars = await cRes.json();
            schedule = await sRes.json();
            works_types = await wtRes.json();
            objects = await oRes.json();
            resourceTypes = await rRes.json();
            
            renderSettings();
            fillFilters();
            renderTables(); 
        } catch (err) { console.error("Datu ielādes kļūda:", err); }
    }

    // --- PIEVIENOŠANAS FUNKCIJAS ---
    async function addItem(apiPath, inputId) {
        const name = document.getElementById(inputId).value.trim();
        if (!name) return;
        try {
            const res = await fetch(`/api/${apiPath}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            if (res.ok) {
                document.getElementById(inputId).value = '';
                loadData();
            }
        } catch (err) { console.error(err); }
    }

    async function addResource() {
        const name = document.getElementById('newResName').value.trim();
        if (!name) return;
        try {
            const res = await fetch('/api/resource-types', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, quantity: 0 })
            });
            if (res.ok) {
                document.getElementById('newResName').value = '';
                loadData();
            }
        } catch (err) { console.error(err); }
    }

    async function handleTopUp(id, resourceName) {
        const input = document.getElementById(`topup_val_${id}`);
        const amount = parseFloat(input.value);
        if (isNaN(amount) || amount <= 0) return;

        try {
            const res = await fetch('/api/resource-types/topup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, amount, resource_name: resourceName })
            });
            if (res.ok) {
                alert(`Papildināts: ${resourceName} (+${amount}L)`);
                loadData();
            }
        } catch (err) { console.error(err); }
    }

    async function deleteItem(type, id) {
        if (!confirm("Vai tiešām vēlaties izdzēst?")) return;
        try {
            const res = await fetch(`/api/${type}/${id}`, { method: 'DELETE' });
            if (res.ok) loadData();
        } catch (err) { console.error(err); }
    }

    // --- RENDERING ---
    function renderSettings() {
        // Darbinieki
        document.getElementById("workerList").innerHTML = workers.map(w => `
            <li>
                <div><strong>${w.name}</strong> ${w.temp_password ? `<span class="temp-pass">${w.temp_password}</span>` : ''}</div>
                <button class="delete-btn" onclick="deleteItem('workers', ${w.id})">🗑️</button>
            </li>
        `).join("");

        // Resursi
        document.getElementById("resourceList").innerHTML = resourceTypes.map(res => `
            <li style="flex-direction: column; align-items: stretch;">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <strong>${res.name}</strong>
                    <span class="oil-val">${res.quantity || 0} L</span>
                </div>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="topup_val_${res.id}" placeholder="+ litri" style="width:100%; padding:2px;">
                    <button onclick="handleTopUp(${res.id}, '${res.name}')" style="background:#28a745; color:white; border:none; padding:2px 8px; border-radius:4px;">+</button>
                    <button class="delete-btn" onclick="deleteItem('resource-types', ${res.id})">🗑️</button>
                </div>
            </li>
        `).join("");

        // Generic saraksti
        renderGeneric("carList", cars, "cars");
        renderGeneric("workList", works_types, "work-types");
        renderGeneric("objectList", objects, "objects");
    }

    function renderGeneric(elementId, data, apiPath) {
        document.getElementById(elementId).innerHTML = data.map(item => `
            <li>
                <span>${item.name}</span>
                <button class="delete-btn" onclick="deleteItem('${apiPath}', ${item.id})">🗑️</button>
            </li>
        `).join("");
    }

    function renderTables() {
        const fYear = document.getElementById("filterYear").value;
        const fMonth = document.getElementById("filterMonth").value;
        const fWorker = document.getElementById("filterWorker").value;

        let filtered = schedule.filter(e => {
            const year = e.date ? e.date.split('.')[2] : "";
            return (!fYear || year === fYear) && (!fMonth || e.month === fMonth) && (!fWorker || e.worker_name === fWorker);
        });

        // Summas
        document.getElementById("totalHoursValue").textContent = filtered.reduce((sum, item) => sum + (parseFloat(item.hours) || 0), 0).toFixed(2);
        document.getElementById("totalOilValue").textContent = filtered.reduce((sum, e) => sum + parseFloat(e.pielietā_eļļa || 0), 0).toFixed(2);
        document.getElementById("totalFuelValue").textContent = filtered.reduce((sum, e) => sum + parseFloat(e.pielietā_degviela || 0), 0).toFixed(2);

        // Galvenā tabula
        let workHtml = `<table><thead><tr><th>Datums</th><th>Auto</th><th>Darbinieks</th><th>Objekts</th><th>Darbs</th><th>h</th></tr></thead><tbody>`;
        workHtml += filtered.map(e => `<tr><td>${e.date}</td><td>${e.car}</td><td>${e.worker_name}</td><td>${e.objekts}</td><td>${e.darbs}</td><td>${parseFloat(e.hours || 0).toFixed(2)}</td></tr>`).join("");
        document.getElementById("tableContainer").innerHTML = workHtml + "</tbody></table>";
    }

    function fillFilters() {
        const years = [...new Set(schedule.map(e => e.date ? e.date.split('.')[2] : null))].filter(Boolean).sort();
        const months = ["Janvāris", "Februāris", "Marts", "Aprīlis", "Maijs", "Jūnijs", "Jūlijs", "Augusts", "Septembris", "Oktobris", "Novembris", "Decembris"];
        
        document.getElementById("filterYear").innerHTML = '<option value="">Visi</option>' + years.map(y => `<option value="${y}">${y}</option>`).join("");
        document.getElementById("filterMonth").innerHTML = '<option value="">Visi</option>' + months.map(m => `<option value="${m}">${m}</option>`).join("");
        document.getElementById("filterWorker").innerHTML = '<option value="">Visi</option>' + workers.map(w => `<option value="${w.name}">${w.name}</option>`).join("");
    }

    document.getElementById("clearFilters").onclick = () => {
        document.querySelectorAll("select").forEach(s => s.value = "");
        renderTables();
    };

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    };

    ["filterYear", "filterMonth", "filterWorker"].forEach(id => {
        document.getElementById(id).addEventListener("change", renderTables);
    });

    loadData();
    </script>
</body>
</html>
