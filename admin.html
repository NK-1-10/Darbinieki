<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Panelis - Darba Uzskaite</title>
    <style>
        :root {
            --primary-dark: #1a3025;
            --accent-gold: #c5a059;
            --danger-red: #dc3545;
            --success-green: #28a745;
            --bg-light: #fdfdfd;
            --border-color: #e0e0e0;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; background: var(--bg-light); color: #333; font-size: 14px; }
        .container { max-width: 1300px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary-dark); padding-bottom: 10px; }
        h2, h3 { color: var(--primary-dark); text-transform: uppercase; letter-spacing: 1px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        details.pogas { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        summary { cursor: pointer; font-weight: bold; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; list-style: none; }
        details[open] summary { border-bottom: 2px solid var(--accent-gold); }
        .settings-content { padding: 15px; }

        .filter-section { background: #fff; border: 1px solid var(--border-color); padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }

        .summary-bar { background: #f8f9fa; padding: 12px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--accent-gold); font-weight: bold; margin-bottom: 15px; }
        .report-card { background: #fff; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .report-card > summary { background: var(--primary-dark); color: #fff; padding: 15px 25px; list-style: none; }

        .header-filter { width: 100%; margin-top: 5px; padding: 6px; border: 1px solid rgba(197, 160, 89, 0.4); border-radius: 4px; font-size: 0.85em; background: #fff; }
        .table-wrapper { overflow-x: auto; max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; padding: 10px; text-align: left; background: #fcfcfc; border-bottom: 2px solid #eee; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
        tr:hover { background-color: #fcf9f2; }

        .error-row { background-color: #fff5f5; color: #d9534f; }
        .error-badge { background: #d9534f; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; }

        button { cursor: pointer; border-radius: 8px; border: none; font-weight: 600; transition: 0.2s; }
        .btn-add { background: var(--success-green); color: white; width: 100%; padding: 10px; margin-bottom: 10px; }
        .btn-del { color: var(--danger-red); background: none; font-size: 1.2em; padding: 0 5px; }
        
        /* Iztīrīšanas poga - tagad vienmēr redzama */
        .btn-clear { background: var(--danger-red); color: white; padding: 8px 12px; font-size: 0.85em; display: block; }

        .gold-val { color: #b8860b; font-weight: bold; }
        ul { padding: 0; margin: 0; list-style: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Admin Vadības Panelis</h2>
        <button id="logoutBtn" style="background: var(--danger-red); color: white; padding: 10px 20px;">Izrakstīties 🚪</button>
    </header>

    <div class="grid-container">
        <details class="pogas"><summary>👷 Darbinieki</summary><div class="settings-content"><button class="btn-add" onclick="addNewWorker()">➕ Pievienot darbinieku</button><ul id="workerList"></ul></div></details>
        <details class="pogas"><summary>🚗 Mašīnas</summary><div class="settings-content"><button class="btn-add" onclick="addNewItem('/api/cars', 'Mašīnas nr')">➕ Pievienot mašīnu</button><ul id="carList"></ul></div></details>
        <details class="pogas"><summary>⚒️ Darba veidi</summary><div class="settings-content"><button class="btn-add" onclick="addNewItem('/api/work-types', 'Darba veids')">➕ Pievienot veidu</button><ul id="workList"></ul></div></details>
        <details class="pogas"><summary>📍 Objekti</summary><div class="settings-content"><button class="btn-add" onclick="addNewItem('/api/objects', 'Objekta nosaukums')">➕ Pievienot objektu</button><ul id="objectList"></ul></div></details>
        
        <details class="pogas"><summary>🛢️ Resursi</summary><div class="settings-content"><button class="btn-add" onclick="addNewItem('/api/resource-types', 'Resursa nosaukums')">➕ Jauns resurss</button><ul id="resourceList"></ul></div></details>
    </div>

    <div class="report-stack">
        <details class="report-card" open>
            <summary>📋 Darba Gaitas Atskaite</summary>
            <div class="settings-content">
                <div class="summary-bar">
                    <div>Kopā stundas: <span id="totalHoursValue" class="gold-val">0.00</span> h</div>
                    <button class="btn-clear" onclick="clearTable('/api/schedule')">🗑️ Iztīrīt datus</button>
                </div>
                <div id="tableContainer" class="table-wrapper"></div>
            </div>
        </details>

        <details class="report-card" open>
            <summary>⛽ Patēriņa Kopsavilkums</summary>
            <div class="settings-content">
                <div class="summary-bar" style="border-left-color: #b8860b;">
                    <div>Kopā patēriņš: <span id="totalFuelValue" class="gold-val">0.00</span> L</div>
                    <button class="btn-clear" onclick="clearTable('/api/fuel-logs')">🗑️ Iztīrīt datus</button>
                </div>
                <div id="oilContainer" class="table-wrapper"></div>
            </div>
        </details>
    </div>
</div>

<script>
    let workers = [], cars = [], schedule = [], workTypes = [], objects = [], resourceTypes = [];

    // Funkcija datuma sakārtošanai (no DD.MM.YYYY uz YYYY-MM-DD)
    function sortByDate(a, b) {
        const dateA = a.date ? a.date.split('.').reverse().join('-') : "";
        const dateB = b.date ? b.date.split('.').reverse().join('-') : "";
        return dateB.localeCompare(dateA); 
    }

    async function loadData() {
        try {
            const res = await Promise.all([
                fetch('/api/workers'), fetch('/api/cars'), fetch('/api/schedule'),
                fetch('/api/work-types'), fetch('/api/objects'), fetch('/api/resource-types')
            ]);
            [workers, cars, schedule, workTypes, objects, resourceTypes] = await Promise.all(res.map(r => r.json()));
            
            renderSettings();
            renderTables();
        } catch (err) { console.error("Datu ielādes kļūda:", err); }
    }

    function renderSettings() {
        const updateList = (id, data, deleteFn, key = 'name') => {
            const el = document.getElementById(id);
            if (!el) return;
            el.innerHTML = data.map(item => `
                <li style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;">
                    <span>${item[key] || item}</span>
                    <button class="btn-del" onclick="${deleteFn}('${item[key] || item}')">✖</button>
                </li>
            `).join("");
        };

        updateList("workerList", workers, "deleteWorker");
        updateList("carList", cars, "deleteCar");
        updateList("workList", workTypes, "deleteWorkType");
        updateList("objectList", objects, "deleteObject");
        updateList("resourceList", resourceTypes, "deleteResource");
    }

    function renderTables() {
        // Sakārtojam grafiku tā, lai jaunākie datumi ir augšā
        const sortedSchedule = [...schedule].sort(sortByDate);

        // 1. Darba tabula
        const workData = sortedSchedule.filter(e => e.objekts && e.objekts !== "-");
        document.getElementById("tableContainer").innerHTML = `<table><thead><tr><th>Datums</th><th>Darbinieks</th><th>Objekts</th><th>Stundas</th></tr></thead><tbody>` + 
            workData.map(e => `<tr><td>${e.date}</td><td>${e.worker_name}</td><td>${e.objekts}</td><td><b>${e.hours || 0}</b></td></tr>`).join("") + "</tbody></table>";

        // 2. Patēriņa tabula
        const fuelData = sortedSchedule.filter(e => e.resource_name);
        document.getElementById("oilContainer").innerHTML = `<table><thead><tr><th>Datums</th><th>Darbinieks</th><th>Resurss</th><th>Daudzums</th></tr></thead><tbody>` + 
            fuelData.map(e => `<tr><td>${e.date}</td><td>${e.worker_name}</td><td>${e.resource_name}</td><td class="gold-val">${e.resource_amount} L</td></tr>`).join("") + "</tbody></table>";
    }

    // Dzēšanas funkcijas
    async function deleteItem(url, name) {
        if (confirm(`Dzēst ${name}?`)) {
            await fetch(`${url}/${encodeURIComponent(name)}`, { method: 'DELETE' });
            loadData();
        }
    }
    const deleteWorker = (n) => deleteItem('/api/workers', n);
    const deleteCar = (n) => deleteItem('/api/cars', n);
    const deleteWorkType = (n) => deleteItem('/api/work-types', n);
    const deleteObject = (n) => deleteItem('/api/objects', n);
    const deleteResource = (n) => deleteItem('/api/resource-types', n);

    async function clearTable(url) {
        if (confirm("UZMANĪBU! Šī darbība izdzēsīs VISUS datus šajā tabulā. Turpināt?")) {
            await fetch(url, { method: 'DELETE' });
            loadData();
        }
    }

    loadData();
</script>
</body>
</html>
