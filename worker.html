<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darbinieka Panelis</title>
    <style>
        :root {
            --saulstari-green: #1a3025;
            --saulstari-yellow: #d4b45d;
            --saulstari-gray: #4a5d53;
            --bg-light: #f4f6f1;
            --white: #ffffff;
            --success: #27ae60;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto 30px;
            border-top: 5px solid var(--saulstari-yellow);
            text-align: center;
        }

        h2 { color: var(--saulstari-green); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        h3 { color: var(--saulstari-green); margin-bottom: 15px; }

        #status { 
            font-size: 1.1rem; 
            margin-bottom: 10px; 
            padding: 10px;
            border-radius: 10px;
            background: #fdfdfd;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            padding: 14px 24px;
            border-radius: 50px; 
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin: 5px;
        }

        #AtWork { background: var(--saulstari-green); color: white; width: 100%; }
        #LeaveWork { background: #e74c3c; color: white; width: 100%; }
        #startBtn { background: var(--success); color: white; width: 100%; margin-top: 15px; }
        #stopBtn { background: var(--saulstari-yellow); color: var(--saulstari-green); width: 100%; margin-top: 15px; }
        .oil-btn { background: var(--saulstari-yellow); color: var(--saulstari-green); }
        .fuel-btn { background: var(--saulstari-green); color: white; }
        #logoutBtn { background: transparent; color: #888; border: 1px solid #ddd; margin-top: 20px; padding: 8px 15px; font-size: 0.8rem; }

        #tableContainer { max-width: 1000px; margin: 0 auto; background: var(--white); border-radius: 15px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--saulstari-green); color: white; padding: 15px; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.9rem; }
        
        #resourceModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center;
        }
        .modal-content {
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="welcome"></h2>
        <div id="status">Statuss: Gaidīšana</div>
        <div id="startTimeDisplay" style="color: var(--success); font-weight: bold; margin-bottom: 10px;"></div>

        <div>
            <button id="AtWork">ESMU DARBĀ</button>
            <button id="LeaveWork" style="display:none;">DODOS PROJĀM</button>
        </div>

        <div id="workControls">
            <select id="car" required><option value="">-- Izvēlies mašīnu --</option></select>
            <select id="object" required><option value="">-- Izvēlies objektu --</option></select>
            <select id="work" required><option value="">-- Izvēlies darba veidu --</option></select>
            
            <button id="startBtn" style="display:none;">Sākt darbu</button>
            <button id="stopBtn" style="display:none;">Beigt darbu</button>

            <button id="Ella" class="oil-btn" style="display:none;">Pieleju Eļļu</button>
            <button id="Degviela" class="fuel-btn" style="display:none;">Pielej Degvielu</button>
        </div>

        <button id="logoutBtn">Izrakstīties</button>
    </div>

    <div id="resourceModal">
        <div class="modal-content">
            <h3 id="modalTitle">Pievienot resursu</h3>
            <label>Izvēlies mašīnu:</label>
            <select id="modalCarSelect"></select>
            <label>Ievadi litrus:</label>
            <input type="number" id="modalAmountInput" step="0.01" placeholder="0.00">
            <div style="display:flex; gap:10px; margin-top: 15px;">
                <button id="modalCancel" style="flex:1; background:#6c757d; color:white;">Atcelt</button>
                <button id="modalSave" style="flex:1; background:var(--success); color:white;">Saglabāt</button>
            </div>
        </div>
    </div>

    <h3 style="text-align: center;">Tavi pēdējie ieraksti:</h3>
    <div id="tableContainer"></div>

<script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user) { window.location.href = "index.html"; } 

    document.getElementById("welcome").textContent = `Darbinieks: ${user.name}`;

    const carSelect = document.getElementById("car");
    const objectSelect = document.getElementById("object");
    const workSelect = document.getElementById("work");
    const tableContainer = document.getElementById("tableContainer");
    let currentResourceType = ""; 

    async function loadWorkerData() {
        try {
            const [cRes, oRes, wRes, sRes] = await Promise.all([
                fetch('/api/cars'), fetch('/api/objects'), fetch('/api/work-types'), fetch('/api/schedule')
            ]);
            const cars = await cRes.json();
            const objects = await oRes.json();
            const workTypes = await wRes.json();
            const allSchedule = await sRes.json();

            fillSelect(carSelect, cars, "-- Izvēlies mašīnu --");
            fillSelect(objectSelect, objects, "-- Izvēlies objektu --");
            fillSelect(workSelect, workTypes, "-- Izvēlies darba veidu --");

            const workerHistory = allSchedule.filter(e => e.worker_name === user.name);
            const activeJob = workerHistory.find(e => !e.beigu_laiks);
            
            // Pārbaudām shift statusu no localStorage
            const isShiftStarted = !!localStorage.getItem(`shift_start_${user.name}`);

            if (activeJob) {
                document.getElementById("status").innerHTML = `Strādā: <b>${activeJob.objekts}</b> (${activeJob.car})`;
                document.getElementById("startTimeDisplay").innerText = `Sāki: ${activeJob.sākuma_laiks.split(' ')[1]}`;
                
                document.getElementById("startBtn").style.display = "none";
                document.getElementById("stopBtn").style.display = "block";
                document.getElementById("LeaveWork").style.display = "none";
                
                [carSelect, objectSelect, workSelect].forEach(s => s.disabled = true);
                carSelect.value = activeJob.car;
                objectSelect.value = activeJob.objekts || "";
                workSelect.value = activeJob.darbs || "";
            } else {
                [carSelect, objectSelect, workSelect].forEach(s => s.disabled = false);
                document.getElementById("status").textContent = isShiftStarted ? "Statuss: Maiņa sākta" : "Statuss: Gaidīšana";
                document.getElementById("startTimeDisplay").innerText = "";
                
                document.getElementById("startBtn").style.display = isShiftStarted ? "block" : "none";
                document.getElementById("stopBtn").style.display = "none";
                document.getElementById("LeaveWork").style.display = isShiftStarted ? "block" : "none";
            }

            document.getElementById("AtWork").style.display = isShiftStarted ? "none" : "block";
            document.getElementById("Ella").style.display = isShiftStarted ? "block" : "none";
            document.getElementById("Degviela").style.display = isShiftStarted ? "block" : "none";

            renderTable(workerHistory);
        } catch (err) { console.error("Kļūda ielādējot datus:", err); }
    }

    document.getElementById("AtWork").onclick = () => {
        localStorage.setItem(`shift_start_${user.name}`, new Date().toISOString());
        loadWorkerData();
    };

    document.getElementById("LeaveWork").onclick = async () => {
        if (!confirm("Vai tiešām beigt darba dienu?")) return;
        
        try {
            const sRes = await fetch('/api/schedule');
            const allSchedule = await sRes.json();
            const sodien = new Date().toLocaleDateString('lv-LV');
            
            // Atrodam šīs dienas darbus, lai noteiktu reālo sākuma laiku
            const sodienasDarbi = allSchedule.filter(e => 
                e.worker_name === user.name && e.sākuma_laiks.startsWith(sodien)
            ).sort((a, b) => a.id - b.id);

            let sakumaLaiksString;
            let startObject;

            if (sodienasDarbi.length > 0) {
                // Ja ir darbi, ņemam paša pirmā darba laiku
                sakumaLaiksString = sodienasDarbi[0].sākuma_laiks.split(' ')[1];
                const parts = sodienasDarbi[0].sākuma_laiks.split(/[. :]/);
                startObject = new Date(parts[2], parts[1]-1, parts[0], parts[3], parts[4], parts[5]);
            } else {
                // Ja darbu nav, ņemam no localStorage
                const lsStart = localStorage.getItem(`shift_start_${user.name}`);
                startObject = lsStart ? new Date(lsStart) : new Date();
                sakumaLaiksString = startObject.toLocaleTimeString('lv-LV');
            }

            const beiguObjekt = new Date();
            const stundas = ((beiguObjekt - startObject) / 3600000).toFixed(2);

            const data = {
                darbinieks: user.name,
                datums: sodien,
                sāka_darbu: sakumaLaiksString,
                beidza_darbu: beiguObjekt.toLocaleTimeString('lv-LV'),
                month: new Intl.DateTimeFormat('lv-LV', { month: 'long' }).format(beiguObjekt),
                stundas: Math.max(0, parseFloat(stundas))
            };

            await fetch('/api/darba-stundas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            localStorage.removeItem(`shift_start_${user.name}`);
            window.location.reload();
        } catch (err) { alert("Kļūda saglabājot maiņu!"); }
    };

    document.getElementById("startBtn").onclick = async () => {
        if (!carSelect.value || !objectSelect.value || !workSelect.value) return alert("Izvēlies visus laukus!");
        const now = new Date();
        const startTimeStr = `${now.toLocaleDateString('lv-LV')} ${now.toLocaleTimeString('lv-LV')}`;
        
        await fetch('/api/start-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                worker_name: user.name, car: carSelect.value, objekts: objectSelect.value, 
                darbs: workSelect.value, start_time: startTimeStr 
            })
        });
        loadWorkerData();
    };

    document.getElementById("stopBtn").onclick = async () => {
        if (!confirm("Beigt šo darbu?")) return;
        const now = new Date();
        const endTimeStr = `${now.toLocaleDateString('lv-LV')} ${now.toLocaleTimeString('lv-LV')}`;
        
        await fetch('/api/stop-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ worker_name: user.name, end_time: endTimeStr })
        });
        loadWorkerData();
    };

    function openResourceModal(type) {
        currentResourceType = type;
        document.getElementById("modalTitle").innerText = type === "Ella" ? "Eļļas pieliešana" : "Degvielas uzpilde";
        const modalSelect = document.getElementById("modalCarSelect");
        modalSelect.innerHTML = carSelect.innerHTML; 
        if (carSelect.value) modalSelect.value = carSelect.value;
        document.getElementById("resourceModal").style.display = "flex";
    }

    document.getElementById("Ella").onclick = () => openResourceModal("Ella");
    document.getElementById("Degviela").onclick = () => openResourceModal("Degviela");
    document.getElementById("modalCancel").onclick = () => { document.getElementById("resourceModal").style.display = "none"; };

    document.getElementById("modalSave").onclick = async () => {
        const auto = document.getElementById("modalCarSelect").value;
        const litri = document.getElementById("modalAmountInput").value;
        if (!auto || litri <= 0) return alert("Ievadi korektus datus!");
        
        await fetch('/api/update-resources', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ worker_name: user.name, car: auto, type: currentResourceType, amount: litri })
        });
        document.getElementById("resourceModal").style.display = "none";
        document.getElementById("modalAmountInput").value = "";
        loadWorkerData();
    };

    function fillSelect(selectEl, data, defaultText) {
        const currentVal = selectEl.value;
        selectEl.innerHTML = `<option value="">${defaultText}</option>`;
        data.forEach(item => {
            const opt = document.createElement("option");
            opt.value = item; opt.textContent = item;
            selectEl.appendChild(opt);
        });
        selectEl.value = currentVal;
    }

    function renderTable(data) {
        if (!data || !data.length) { tableContainer.innerHTML = "<p style='padding:15px;'>Nav ierakstu.</p>"; return; }
        let html = `<table><tr><th>Auto</th><th>Objekts</th><th>Darbs</th><th>Sākums</th><th>Beigas</th><th>Eļļa</th><th>Degv.</th><th>Stundas</th></tr>`;
        data.slice().reverse().forEach(e => {
            html += `<tr>
                <td>${e.car}</td>
                <td>${e.objekts || '-'}</td>
                <td>${e.darbs || '-'}</td>
                <td>${e.sākuma_laiks || '-'}</td>
                <td>${e.beigu_laiks || '<span style="color:green;font-weight:bold;">Aktīvs</span>'}</td>
                <td style="color:#d4b45d;font-weight:bold;">${e.pielietā_eļļa || 0} L</td>
                <td style="color:#1a3025;font-weight:bold;">${e.pielietā_degviela || 0} L</td>
                <td><b>${e.hours ? e.hours + ' h' : '-'}</b></td>
            </tr>`;
        });
        tableContainer.innerHTML = html + "</table>";
    }

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    };

    loadWorkerData();
</script>
</body>
</html>
