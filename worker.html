<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darbinieka Panelis</title>
    <style>
        :root {
            --saulstari-green: #1a3025;
            --saulstari-yellow: #d4b45d;
            --saulstari-gray: #4a5d53;
            --bg-light: #f4f6f1;
            --white: #ffffff;
            --success: #27ae60;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto 30px;
            border-top: 5px solid var(--saulstari-yellow);
            text-align: center;
        }

        h2 { color: var(--saulstari-green); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        h3 { color: var(--saulstari-green); margin-bottom: 15px; }

        #status { 
            font-size: 1.1rem; 
            margin-bottom: 10px; 
            padding: 10px;
            border-radius: 10px;
            background: #fdfdfd;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            padding: 14px 24px;
            border-radius: 50px; 
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin: 5px;
        }

        #AtWork { background: var(--saulstari-green); color: white; width: 100%; }
        #LeaveWork { background: var(--saulstari-gray); color: white; width: 100%; }
        #startBtn { background: var(--success); color: white; width: 100%; margin-top: 15px; }
        #stopBtn { background: var(--saulstari-yellow); color: var(--saulstari-green); width: 100%; margin-top: 15px; }
        
        /* Jaunā resursu poga */
        .res-btn { background: #d4b45d; color: #1a3025; border: 2px solid #1a3025; }

        #logoutBtn { background: transparent; color: #888; border: 1px solid #ddd; margin-top: 20px; padding: 8px 15px; font-size: 0.8rem; }

        #tableContainer { max-width: 1000px; margin: 0 auto; background: var(--white); border-radius: 15px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--saulstari-green); color: white; padding: 15px; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.9rem; }
        .oil-text { color: var(--saulstari-yellow); font-weight: bold; }
        .fuel-text { color: var(--saulstari-green); font-weight: bold; }

        #resourceModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center;
        }
        .modal-content {
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="welcome"></h2>
        <div id="status">Statuss: Gaidīšana</div>
        <div id="startTimeDisplay" style="color: var(--success); font-weight: bold;"></div>

        <div>
            <button id="AtWork">SĀKT DARBA DIENU</button>
            <button id="LeaveWork" style="display:none;">BEIGT DARBA DIENU</button>
        </div>

        <div id="workControls">
            <select id="car" required><option value="">-- Izvēlies mašīnu --</option></select>
            <select id="object" required><option value="">-- Izvēlies objektu --</option></select>
            <select id="work" required><option value="">-- Izvēlies darba veidu --</option></select>
            
            <button id="startBtn" style="display:none;">Sākt darbu</button>
            <button id="stopBtn" style="display:none;">Beigt darbu</button>

            <button id="OpenResourceBtn" class="res-btn" style="display:none; width: 100%; margin-top: 10px;">🛢️ Reģistrēt Degvielu / Eļļu</button>
        </div>

        <button id="logoutBtn">Izrakstīties</button>
    </div>

    <div id="resourceModal">
        <div class="modal-content">
            <h3 style="margin-top:0;">Pievienot resursu</h3>
            
            <label>Ko Tu lej?</label>
            <select id="modalResourceSelect">
                <option value="">-- Izvēlies resursu no noliktavas --</option>
            </select>

            <label>Kurā mašīnā?</label>
            <select id="modalCarSelect"></select>

            <label>Daudzums (L):</label>
            <input type="number" id="modalAmountInput" step="0.1" placeholder="Piemēram, 20">

            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="modalCancel" style="flex:1; background:#6c757d; color:white;">Atcelt</button>
                <button id="modalSave" style="flex:1; background:var(--success); color:white;">Saglabāt</button>
            </div>
        </div>
    </div>

    <h3 style="text-align: center;">Tavi pēdējie ieraksti:</h3>
    <div id="tableContainer"></div>

<script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user) { window.location.href = "index.html"; } 

    document.getElementById("welcome").textContent = `Darbinieks: ${user.name}`;

    const carSelect = document.getElementById("car");
    const objectSelect = document.getElementById("object");
    const workSelect = document.getElementById("work");
    const tableContainer = document.getElementById("tableContainer");

    async function loadWorkerData() {
        try {
            // PIELIKTS: ielādējam arī resursus no noliktavas
            const [cRes, oRes, wRes, sRes, rRes] = await Promise.all([
                fetch('/api/cars'), fetch('/api/objects'), fetch('/api/work-types'), 
                fetch('/api/schedule'), fetch('/api/resource-types')
            ]);
            
            const cars = await cRes.json();
            const objects = await oRes.json();
            const workTypes = await wRes.json();
            const allSchedule = await sRes.json();
            const resources = await rRes.json();

            fillSelect(carSelect, cars, "-- Izvēlies mašīnu --");
            fillSelect(objectSelect, objects, "-- Izvēlies objektu --");
            fillSelect(workSelect, workTypes, "-- Izvēlies darba veidu --");

            // Aizpildām resursu izvēli modālajā logā
            const resModalSelect = document.getElementById("modalResourceSelect");
            resModalSelect.innerHTML = '<option value="">-- Ko Tu lej? --</option>' + 
                resources.map(r => `<option value="${r.id}">${r.name} (Pieejams: ${r.quantity}L)</option>`).join("");

            const activeJob = allSchedule.find(e => e.worker_name === user.name && !e.beigu_laiks);
            const shiftStartTime = localStorage.getItem(`shift_start_${user.name}`);
            const isShiftStarted = !!shiftStartTime;

            if (activeJob) {
                document.getElementById("status").innerHTML = `Strādā: <b>${activeJob.objekts}</b> (${activeJob.car})`;
                document.getElementById("startTimeDisplay").innerText = `Sāki: ${activeJob.sākuma_laiks}`;
                document.getElementById("startBtn").style.display = "none";
                document.getElementById("stopBtn").style.display = "block";
                document.getElementById("LeaveWork").style.display = "none"; 
                [carSelect, objectSelect, workSelect].forEach(s => s.disabled = true);
                carSelect.value = activeJob.car;
                objectSelect.value = activeJob.objekts || "";
                workSelect.value = activeJob.darbs || "";
            } else {
                [carSelect, objectSelect, workSelect].forEach(s => s.disabled = false);
                document.getElementById("status").textContent = isShiftStarted ? "Statuss: Maiņa sākta" : "Statuss: Gaidīšana";
                document.getElementById("startTimeDisplay").innerText = "";
                document.getElementById("startBtn").style.display = isShiftStarted ? "block" : "none";
                document.getElementById("stopBtn").style.display = "none";
                document.getElementById("LeaveWork").style.display = isShiftStarted ? "block" : "none";
            }

            document.getElementById("AtWork").style.display = isShiftStarted ? "none" : "block";
            // Rādām jauno pogu tikai tad, ja maiņa ir sākta
            document.getElementById("OpenResourceBtn").style.display = isShiftStarted ? "block" : "none";

            renderTable(allSchedule.filter(e => e.worker_name === user.name));
        } catch (err) { console.error(err); }
    }

    // --- MODĀLĀ LOGA VADĪBA ---
    document.getElementById("OpenResourceBtn").onclick = () => {
        const modalCar = document.getElementById("modalCarSelect");
        modalCar.innerHTML = carSelect.innerHTML; // Pārkopējam sarakstu
        if (carSelect.value) modalCar.value = carSelect.value;
        document.getElementById("resourceModal").style.display = "flex";
    };

    document.getElementById("modalCancel").onclick = () => {
        document.getElementById("resourceModal").style.display = "none";
    };

    document.getElementById("modalSave").onclick = async () => {
        const resourceId = document.getElementById("modalResourceSelect").value;
        const resourceName = document.getElementById("modalResourceSelect").selectedOptions[0].text;
        const auto = document.getElementById("modalCarSelect").value;
        const litri = parseFloat(document.getElementById("modalAmountInput").value);

        if (!resourceId || !auto || isNaN(litri) || litri <= 0) {
            return alert("Lūdzu, aizpildi visus laukus!");
        }

        try {
            // 1. ATŅEMAM NO ADMIN NOLIKTAVAS
            const subRes = await fetch(`/api/resource-types/${resourceId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'sub', amount: litri })
            });

            if (!subRes.ok) {
                const errorData = await subRes.json();
                throw new Error(errorData.error || "Kļūda noliktavā");
            }

            // 2. PIERAKSTĀM DARBINIEKA DARBA GAITAI
            const isOil = resourceName.toLowerCase().includes("eļļa");
            const type = isOil ? "Ella" : "Degviela";

            await fetch('/api/update-resources', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    worker_name: user.name, 
                    car: auto, 
                    type: type, 
                    amount: litri 
                })
            });

            document.getElementById("resourceModal").style.display = "none";
            document.getElementById("modalAmountInput").value = "";
            loadWorkerData(); // Atsvaidzinām visu
            alert("Veiksmīgi reģistrēts!");
        } catch (err) {
            alert("Kļūda: " + err.message);
        }
    };

    // --- PĀRĒJĀS POGAS ---
    document.getElementById("AtWork").onclick = () => {
        localStorage.setItem(`shift_start_${user.name}`, new Date().toISOString());
        loadWorkerData();
    };

    document.getElementById("LeaveWork").onclick = async () => {
        if (!confirm("Beigt darba dienu?")) return;
        const tagad = new Date();
        const shiftStartRaw = localStorage.getItem(`shift_start_${user.name}`);
        let stundas = 0;
        if (shiftStartRaw) { stundas = ((tagad - new Date(shiftStartRaw)) / 3600000).toFixed(2); }

        const data = {
            darbinieks: user.name,
            datums: tagad.toLocaleDateString('lv-LV'),
            sāka_darbu: shiftStartRaw ? new Date(shiftStartRaw).toLocaleTimeString('lv-LV') : "--",
            beidza_darbu: tagad.toLocaleTimeString('lv-LV'),
            month: new Intl.DateTimeFormat('lv-LV', { month: 'long' }).format(tagad),
            stundas: parseFloat(stundas) || 0
        };

        await fetch('/api/darba-stundas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        localStorage.removeItem(`shift_start_${user.name}`);
        window.location.reload();
    };

    document.getElementById("startBtn").onclick = async () => {
        if (!carSelect.value || !objectSelect.value || !workSelect.value) return alert("Aizpildi laukus!");
        const now = new Date();
        await fetch('/api/start-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                worker_name: user.name, car: carSelect.value, objekts: objectSelect.value, 
                darbs: workSelect.value, start_time: `${now.toLocaleDateString('lv-LV')} ${now.toLocaleTimeString('lv-LV')}` 
            })
        });
        loadWorkerData();
    };

    document.getElementById("stopBtn").onclick = async () => {
        if (!confirm("Beigt darbu?")) return;
        const now = new Date();
        await fetch('/api/stop-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ worker_name: user.name, end_time: `${now.toLocaleDateString('lv-LV')} ${now.toLocaleTimeString('lv-LV')}` })
        });
        loadWorkerData();
    };

    function fillSelect(selectEl, data, defaultText) {
        const currentVal = selectEl.value;
        selectEl.innerHTML = `<option value="">${defaultText}</option>`;
        data.forEach(item => {
            const opt = document.createElement("option");
            opt.value = item; opt.textContent = item;
            selectEl.appendChild(opt);
        });
        selectEl.value = currentVal;
    }

    function renderTable(data) {
        if (!data || !data.length) { tableContainer.innerHTML = "<p style='padding:15px;'>Nav ierakstu.</p>"; return; }
        let html = `<table><tr><th>Auto</th><th>Objekts</th><th>Darbs</th><th>Sākums</th><th>Beigas</th><th>Eļļa</th><th>Degv.</th><th>Stundas</th></tr>`;
        data.slice().reverse().forEach(e => {
            html += `<tr>
                <td>${e.car}</td>
                <td>${e.objekts || '-'}</td>
                <td>${e.darbs || '-'}</td>
                <td>${e.sākuma_laiks || '-'}</td>
                <td>${e.beigu_laiks || 'Aktīvs'}</td>
                <td class="oil-text">${e.pielietā_eļļa || 0} L</td>
                <td class="fuel-text">${e.pielietā_degviela || 0} L</td>
                <td>${e.hours ? e.hours + ' h' : '-'}</td>
            </tr>`;
        });
        tableContainer.innerHTML = html + "</table>";
    }

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    };

    loadWorkerData();
</script>
</body>
</html>
