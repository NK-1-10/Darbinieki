<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darbinieka Panelis</title>
    <style>
        :root {
            --saulstari-green: #1a3025;
            --saulstari-yellow: #d4b45d;
            --saulstari-gray: #4a5d53;
            --bg-light: #f4f6f1;
            --white: #ffffff;
            --success: #27ae60;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto 30px;
            border-top: 5px solid var(--saulstari-yellow);
            text-align: center;
        }

        h2 { color: var(--saulstari-green); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        #status { font-size: 1.1rem; margin-bottom: 10px; padding: 10px; border-radius: 10px; background: #fdfdfd; }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            padding: 14px 24px;
            border-radius: 50px; 
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin: 5px;
        }

        #AtWork { background: var(--saulstari-green); color: white; width: 100%; }
        #LeaveWork { background: var(--saulstari-gray); color: white; width: 100%; }
        #startBtn { background: var(--success); color: white; width: 100%; margin-top: 15px; }
        #stopBtn { background: var(--saulstari-yellow); color: var(--saulstari-green); width: 100%; margin-top: 15px; }
        .res-btn { background: #d4b45d; color: #1a3025; border: 2px solid #1a3025; }

        #logoutBtn { background: transparent; color: #888; border: 1px solid #ddd; margin-top: 20px; padding: 8px 15px; font-size: 0.8rem; }

        #tableContainer { max-width: 900px; margin: 0 auto; background: var(--white); border-radius: 15px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--saulstari-green); color: white; padding: 15px; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.9rem; }

        .time-label { font-size: 0.9rem; margin-bottom: 5px; display: block; }
        .shift-time { color: var(--saulstari-gray); font-style: italic; }
        .work-time { color: var(--success); font-weight: bold; }

        #resourceModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center;
        }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="welcome"></h2>
        
        <div id="shiftStartTimeDisplay" class="time-label shift-time"></div>
        
        <div id="status">Statuss: Gaidīšana</div>
        
        <div id="workStartTimeDisplay" class="time-label work-time"></div>

        <div>
            <button id="AtWork">SĀKT DARBA DIENU</button>
            <button id="LeaveWork" style="display:none;">BEIGT DARBA DIENU</button>
        </div>

        <div id="workControls">
            <select id="car" required><option value="">-- Izvēlies mašīnu --</option></select>
            <select id="object" required><option value="">-- Izvēlies objektu --</option></select>
            <select id="work" required><option value="">-- Izvēlies darba veidu --</option></select>
            
            <button id="startBtn" style="display:none;">Sākt darbu</button>
            <button id="stopBtn" style="display:none;">Beigt darbu</button>

            <button id="OpenResourceBtn" class="res-btn" style="display:none; width: 100%; margin-top: 10px;">🛢️ Reģistrēt Degvielu / Eļļu</button>
        </div>

        <button id="logoutBtn">Izrakstīties</button>
    </div>

    <div id="resourceModal">
        <div class="modal-content">
            <h3 style="margin-top:0;">Pievienot resursu</h3>
            <label>Ko Tu lej?</label>
            <select id="modalResourceSelect"></select>
            <label>Kurā mašīnā?</label>
            <select id="modalCarSelect"></select>
            <label>Daudzums (L):</label>
            <input type="number" id="modalAmountInput" step="0.1">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="modalCancel" style="flex:1; background:#6c757d; color:white;">Atcelt</button>
                <button id="modalSave" style="flex:1; background:var(--success); color:white;">Saglabāt</button>
            </div>
        </div>
    </div>

    <h3 style="text-align: center;">Tavi pēdējie darba ieraksti:</h3>
    <div id="tableContainer"></div>

<script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user) { window.location.href = "index.html"; } 

    document.getElementById("welcome").textContent = `Darbinieks: ${user.name}`;

    async function loadWorkerData() {
        try {
            const [cRes, oRes, wRes, sRes, rRes] = await Promise.all([
                fetch('/api/cars'), fetch('/api/objects'), fetch('/api/work-types'), 
                fetch('/api/schedule'), fetch('/api/resource-types')
            ]);
            
            const cars = await cRes.json();
            const objects = await oRes.json();
            const workTypes = await wRes.json();
            const allSchedule = await sRes.json();
            const resources = await rRes.json();

            fillSelect(document.getElementById("car"), cars, "-- Izvēlies mašīnu --");
            fillSelect(document.getElementById("object"), objects, "-- Izvēlies objektu --");
            fillSelect(document.getElementById("work"), workTypes, "-- Izvēlies darba veidu --");

            const resModalSelect = document.getElementById("modalResourceSelect");
            resModalSelect.innerHTML = '<option value="">-- Ko Tu lej? --</option>' + 
                resources.map(r => `<option value="${r.id}">${r.name} (Pieejams: ${r.quantity}L)</option>`).join("");

            const activeJob = allSchedule.find(e => e.worker_name === user.name && !e["beigu_laiks"]);
            const shiftStartTime = localStorage.getItem(`shift_start_${user.name}`);
            const isShiftStarted = !!shiftStartTime;

            // 1. RĀDĪT MAIŅAS SĀKUMU (Ieradies darbā)
            const shiftDisplay = document.getElementById("shiftStartTimeDisplay");
            if (isShiftStarted) {
                const sDate = new Date(shiftStartTime);
                shiftDisplay.textContent = `Ieradies darbā: ${sDate.toLocaleTimeString('lv-LV', {hour: '2-digit', minute:'2-digit'})}`;
            } else {
                shiftDisplay.textContent = "";
            }

            // 2. RĀDĪT KONKRĒTĀ DARBA SĀKUMU
            const workTimeDisplay = document.getElementById("workStartTimeDisplay");
            if (activeJob) {
                document.getElementById("status").innerHTML = `Strādā: <b>${activeJob.objekts}</b>`;
                document.getElementById("startBtn").style.display = "none";
                document.getElementById("stopBtn").style.display = "block";
                workTimeDisplay.textContent = `Uzsāki šo darbu: ${activeJob.sākuma_laiks.substring(0, 5)}`;
            } else {
                document.getElementById("status").textContent = isShiftStarted ? "Statuss: Maiņa sākta" : "Statuss: Gaidīšana";
                document.getElementById("startBtn").style.display = isShiftStarted ? "block" : "none";
                document.getElementById("stopBtn").style.display = "none";
                document.getElementById("LeaveWork").style.display = isShiftStarted ? "block" : "none";
                workTimeDisplay.textContent = "";
            }

            document.getElementById("AtWork").style.display = isShiftStarted ? "none" : "block";
            document.getElementById("OpenResourceBtn").style.display = isShiftStarted ? "block" : "none";

            renderTable(allSchedule.filter(e => e.worker_name === user.name));
        } catch (err) { console.error("Kļūda:", err); }
    }

    function renderTable(data) {
        const container = document.getElementById("tableContainer");
        if (!data || !data.length) { 
            container.innerHTML = "<p style='padding:15px;'>Nav ierakstu.</p>"; 
            return; 
        }

        const exclusionList = ["Degvielas uzpilde", "Eļļas papildināšana", "Eļļas uzpilde"];

        let html = `<table>
            <thead>
                <tr>
                    <th>Auto</th>
                    <th>Objekts</th>
                    <th>Darbs</th>
                    <th>Sākums</th>
                    <th>Beigas</th>
                    <th>Stundas</th>
                </tr>
            </thead>
            <tbody>`;

        const filteredData = data.filter(e => {
            const darbaVeids = e.darbs || "";
            return !exclusionList.includes(darbaVeids) && e.objekts && e.objekts !== "-";
        });

        if (filteredData.length === 0) {
            container.innerHTML = "<p style='padding:15px;'>Nav veikto darbu ierakstu.</p>";
            return;
        }

        filteredData.slice().reverse().forEach(e => {
            html += `<tr>
                <td>${e.car || '-'}</td>
                <td>${e.objekts || '-'}</td>
                <td>${e.darbs || '-'}</td>
                <td>${e["sākuma_laiks"] || '-'}</td>
                <td>${e["beigu_laiks"] || 'Aktīvs'}</td>
                <td>${e.hours ? e.hours + ' h' : '-'}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    document.getElementById("OpenResourceBtn").onclick = () => {
        document.getElementById("modalCarSelect").innerHTML = document.getElementById("car").innerHTML;
        document.getElementById("resourceModal").style.display = "flex";
    };

    document.getElementById("modalCancel").onclick = () => {
        document.getElementById("resourceModal").style.display = "none";
    };

    document.getElementById("modalSave").onclick = async () => {
        const resourceId = document.getElementById("modalResourceSelect").value;
        const fullOptionText = document.getElementById("modalResourceSelect").selectedOptions[0].text;
        const resourceName = fullOptionText.split(' (')[0]; 
        const auto = document.getElementById("modalCarSelect").value;
        const litri = parseFloat(document.getElementById("modalAmountInput").value);

        if (!resourceId || !auto || isNaN(litri) || litri <= 0) return alert("Aizpildi laukus!");

        try {
            await fetch(`/api/resource-types/${resourceId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'sub', amount: litri })
            });
            await fetch('/api/update-resources', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ worker_name: user.name, car: auto, resource_name: resourceName, resource_amount: litri })
            });
            document.getElementById("resourceModal").style.display = "none";
            alert(`Reģistrēts: ${resourceName} (${litri} L)`);
            loadWorkerData();
        } catch (err) { alert("Kļūda!"); }
    };

    // POGA: SĀKT DARBA DIENU
    document.getElementById("AtWork").onclick = () => {
        const now = new Date();
        localStorage.setItem(`shift_start_${user.name}`, now.toISOString());
        loadWorkerData(); // Pārlādējam datus, lai laiks parādās
    };

    // POGA: BEIGT DARBA DIENU
    document.getElementById("LeaveWork").onclick = async () => {
        if (!confirm("Beigt darba dienu?")) return;
        localStorage.removeItem(`shift_start_${user.name}`);
        window.location.reload();
    };

    // POGA: SĀKT KONKRĒTU DARBU
    document.getElementById("startBtn").onclick = async () => {
        const now = new Date();
        const auto = document.getElementById("car").value;
        const obj = document.getElementById("object").value;
        const wrk = document.getElementById("work").value;

        if (!auto || !obj || !wrk) return alert("Izvēlies visus laukus!");

        await fetch('/api/start-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                worker_name: user.name, car: auto, 
                objekts: obj, darbs: wrk, 
                start_time: `${now.toLocaleDateString('lv-LV')} ${now.toLocaleTimeString('lv-LV', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}` 
            })
        });
        loadWorkerData();
    };

    // POGA: BEIGT KONKRĒTU DARBU
    document.getElementById("stopBtn").onclick = async () => {
        const now = new Date();
        await fetch('/api/stop-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                worker_name: user.name, 
                end_time: `${now.toLocaleDateString('lv-LV')} ${now.toLocaleTimeString('lv-LV', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}` 
            })
        });
        loadWorkerData();
    };

    function fillSelect(selectEl, data, defaultText) {
        const currentVal = selectEl.value;
        selectEl.innerHTML = `<option value="">${defaultText}</option>`;
        data.forEach(item => {
            const opt = document.createElement("option");
            const val = typeof item === 'object' ? (item.name || item.id) : item;
            opt.value = val; opt.textContent = val;
            selectEl.appendChild(opt);
        });
        selectEl.value = currentVal;
    }

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    };

    loadWorkerData();
</script>
</body>
</html>
