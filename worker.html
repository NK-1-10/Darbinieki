<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darbinieka Panelis</title>
    <style>
        :root {
            --saulstari-green: #1a3025;
            --saulstari-yellow: #d4b45d;
            --saulstari-gray: #4a5d53;
            --bg-light: #f4f6f1;
            --white: #ffffff;
            --success: #27ae60;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto 30px;
            border-top: 5px solid var(--saulstari-yellow);
            text-align: center;
        }

        h2 { color: var(--saulstari-green); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        h3 { color: var(--saulstari-green); margin-bottom: 15px; }

        #status { 
            font-size: 1.1rem; 
            margin-bottom: 10px; 
            padding: 10px;
            border-radius: 10px;
            background: #fdfdfd;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            padding: 14px 24px;
            border-radius: 50px; 
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin: 5px;
        }

        #AtWork { background: var(--saulstari-green); color: white; width: 100%; }
        #LeaveWork { background: var(--saulstari-gray); color: white; width: 100%; }
        #startBtn { background: var(--success); color: white; width: 100%; margin-top: 15px; }
        #stopBtn { background: var(--saulstari-yellow); color: var(--saulstari-green); width: 100%; margin-top: 15px; }
        
        .res-btn { background: #d4b45d; color: #1a3025; border: 2px solid #1a3025; }

        #logoutBtn { background: transparent; color: #888; border: 1px solid #ddd; margin-top: 20px; padding: 8px 15px; font-size: 0.8rem; }

        #tableContainer { max-width: 1000px; margin: 0 auto; background: var(--white); border-radius: 15px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--saulstari-green); color: white; padding: 15px; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.9rem; }

        #resourceModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center;
        }
        .modal-content {
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="welcome"></h2>
        <div id="status">Statuss: Gaidīšana</div>
        <div id="startTimeDisplay" style="color: var(--success); font-weight: bold;"></div>

        <div>
            <button id="AtWork">SĀKT DARBA DIENU</button>
            <button id="LeaveWork" style="display:none;">BEIGT DARBA DIENU</button>
        </div>

        <div id="workControls" style="display:none;">
            <select id="car" required><option value="">-- Izvēlies mašīnu --</option></select>
            <select id="object" required><option value="">-- Izvēlies objektu --</option></select>
            <select id="work" required><option value="">-- Izvēlies darba veidu --</option></select>
            
            <button id="startBtn">Sākt darbu</button>
            <button id="stopBtn" style="display:none;">Beigt darbu</button>

            <button id="OpenResourceBtn" class="res-btn" style="width: 100%; margin-top: 10px;">🛢️ Reģistrēt Degvielu / Eļļu</button>
        </div>

        <button id="logoutBtn">Izrakstīties</button>
    </div>

    <div id="resourceModal">
        <div class="modal-content">
            <h3 style="margin-top:0;">Pievienot resursu</h3>
            <label>Ko Tu lej?</label>
            <select id="modalResourceSelect">
                <option value="">-- Izvēlies resursu no noliktavas --</option>
            </select>
            <label>Kurā mašīnā?</label>
            <select id="modalCarSelect"></select>
            <label>Daudzums (L):</label>
            <input type="number" id="modalAmountInput" step="0.1" placeholder="Piemēram, 20">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="modalCancel" style="flex:1; background:#6c757d; color:white;">Atcelt</button>
                <button id="modalSave" style="flex:1; background:var(--success); color:white;">Saglabāt</button>
            </div>
        </div>
    </div>

    <h3 style="text-align: center;">Tavi pēdējie ieraksti:</h3>
    <div id="tableContainer"></div>

<script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user) { window.location.href = "index.html"; } 

    document.getElementById("welcome").textContent = `Darbinieks: ${user.name}`;

    // Elementu selektori
    const carSelect = document.getElementById("car");
    const objectSelect = document.getElementById("object");
    const workSelect = document.getElementById("work");
    const resModalSelect = document.getElementById("modalResourceSelect");
    const statusEl = document.getElementById("status");
    const startWorkBtn = document.getElementById("AtWork");
    const leaveWorkBtn = document.getElementById("LeaveWork");
    const workControls = document.getElementById("workControls");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const startTimeDisplay = document.getElementById("startTimeDisplay");

    // Palīgfunkcija izvēļņu aizpildīšanai
    function fillSelect(selectEl, data, defaultText) {
        if (!selectEl) return;
        const currentVal = selectEl.value;
        selectEl.innerHTML = `<option value="">${defaultText}</option>`;
        data.forEach(item => {
            const opt = document.createElement("option");
            const val = typeof item === 'object' ? (item.name || item.id) : item;
            opt.value = val; 
            opt.textContent = val;
            selectEl.appendChild(opt);
        });
        selectEl.value = currentVal;
    }

    // UI atjaunošana atkarībā no statusa
    function updateUI(activeJob) {
        const isShiftStarted = !!localStorage.getItem(`shift_start_${user.name}`);
        
        startWorkBtn.style.display = isShiftStarted ? "none" : "block";
        leaveWorkBtn.style.display = isShiftStarted ? "block" : "none";
        workControls.style.display = isShiftStarted ? "block" : "none";

        if (activeJob) {
            statusEl.innerHTML = `Statuss: Strādā pie <b>${activeJob["objekts"]}</b>`;
            startTimeDisplay.innerText = `Sāki: ${activeJob["sākuma_laiks"]}`;
            startBtn.style.display = "none";
            stopBtn.style.display = "block";
            carSelect.disabled = true;
            objectSelect.disabled = true;
            workSelect.disabled = true;
        } else {
            statusEl.innerText = isShiftStarted ? "Statuss: Gatavs darbam" : "Statuss: Gaidīšana";
            startTimeDisplay.innerText = "";
            startBtn.style.display = "block";
            stopBtn.style.display = "none";
            carSelect.disabled = false;
            objectSelect.disabled = false;
            workSelect.disabled = false;
        }
    }

    async function loadWorkerData() {
        try {
            const [carsData, objectsData, workTypesData, resources, allSchedule] = await Promise.all([
                fetch('/api/cars').then(r => r.json()),
                fetch('/api/objects').then(r => r.json()),
                fetch('/api/work-types').then(r => r.json()),
                fetch('/api/resource-types').then(r => r.json()),
                fetch('/api/schedule').then(r => r.json())
            ]);

            fillSelect(carSelect, carsData.map(c => c.name || c), "-- Izvēlies mašīnu --");
            fillSelect(objectSelect, objectsData.map(o => o.name || o), "-- Izvēlies objektu --");
            fillSelect(workSelect, workTypesData.map(w => w.name || w), "-- Izvēlies darba veidu --");

            if (resModalSelect && Array.isArray(resources)) {
                resModalSelect.innerHTML = '<option value="">-- Ko Tu papildināji? --</option>' +
                    resources.map(r => `<option value="${r.id}">${r.name} (${r.quantity}L)</option>`).join('');
            }

            const activeJob = allSchedule.find(s => s.worker_name === user.name && !s["beigu_laiks"]);
            updateUI(activeJob);
            renderTable(allSchedule.filter(s => s.worker_name === user.name));

        } catch (err) {
            console.error("Kļūda ielādējot datus:", err);
        }
    }

    // Pogas un darbības
    startWorkBtn.onclick = () => {
        localStorage.setItem(`shift_start_${user.name}`, new Date().toISOString());
        loadWorkerData();
    };

    leaveWorkBtn.onclick = async () => {
        if (!confirm("Beigt darba dienu?")) return;
        const tagad = new Date();
        const shiftStartRaw = localStorage.getItem(`shift_start_${user.name}`);
        let stundas = 0;
        if (shiftStartRaw) { stundas = ((tagad - new Date(shiftStartRaw)) / 3600000).toFixed(2); }

        await fetch('/api/darba-stundas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                darbinieks: user.name,
                datums: tagad.toLocaleDateString('lv-LV'),
                sāka_darbu: shiftStartRaw ? new Date(shiftStartRaw).toLocaleTimeString('lv-LV') : "--",
                beidza_darbu: tagad.toLocaleTimeString('lv-LV'),
                month: new Intl.DateTimeFormat('lv-LV', { month: 'long' }).format(tagad),
                stundas: parseFloat(stundas) || 0
            })
        });
        localStorage.removeItem(`shift_start_${user.name}`);
        window.location.reload();
    };

    startBtn.onclick = async () => {
        if (!carSelect.value || !objectSelect.value || !workSelect.value) return alert("Aizpildi laukus!");
        const now = new Date();
        await fetch('/api/start-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                worker_name: user.name, 
                car: carSelect.value, 
                objekts: objectSelect.value, 
                darbs: workSelect.value, 
                start_time: `${now.toLocaleDateString('lv-LV')} ${now.toLocaleTimeString('lv-LV')}` 
            })
        });
        loadWorkerData();
    };

    stopBtn.onclick = async () => {
        if (!confirm("Beigt darbu?")) return;
        const now = new Date();
        await fetch('/api/stop-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                worker_name: user.name, 
                end_time: `${now.toLocaleDateString('lv-LV')} ${now.toLocaleTimeString('lv-LV')}` 
            })
        });
        loadWorkerData();
    };

    function renderTable(data) {
        const container = document.getElementById('tableContainer');
        if (!data || data.length === 0) {
            container.innerHTML = '<div style="padding:20px; text-align:center;">Nav ierakstu.</div>';
            return;
        }

        let html = `<table><thead><tr><th>Datums</th><th>Sākums</th><th>Beigas</th><th>Objekts</th><th>Darbs</th><th>Stundas</th></tr></thead><tbody>`;
        data.slice(0, 15).forEach(e => {
            html += `<tr>
                <td>${e["date"] || "-"}</td>
                <td>${e["sākuma_laiks"] || "-"}</td>
                <td>${e["beigu_laiks"] || (e["sākuma_laiks"] ? "Aktīvs" : "-")}</td>
                <td>${e["objekts"] || "-"}</td>
                <td>${e["darbs"] || "-"}</td>
                <td>${e["hours"] || "0.00"}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    document.getElementById("OpenResourceBtn").onclick = () => {
        document.getElementById("modalCarSelect").innerHTML = carSelect.innerHTML;
        document.getElementById("modalCarSelect").value = carSelect.value;
        document.getElementById("resourceModal").style.display = "flex";
    };

    document.getElementById("modalCancel").onclick = () => document.getElementById("resourceModal").style.display = "none";

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    };

    loadWorkerData();
</script>
</body>
</html>
