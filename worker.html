<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darbinieka Panelis | Saulstari</title>
    <style>
        :root {
            --saulstari-green: #1a3025;
            --saulstari-yellow: #d4b45d;
            --saulstari-gray: #4a5d53;
            --bg-light: #f4f6f1;
            --white: #ffffff;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto 30px;
            border-top: 5px solid var(--saulstari-yellow);
            text-align: center;
        }

        h2 { color: var(--saulstari-green); margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        #status { 
            font-size: 1.1rem; 
            margin-bottom: 10px; 
            padding: 12px;
            border-radius: 10px;
            background: #f8f9fa;
            border: 1px solid #eee;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            padding: 14px 24px;
            border-radius: 50px; 
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin: 5px 0;
        }

        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-main { background: var(--saulstari-green); color: white; width: 100%; }
        .btn-stop { background: var(--saulstari-yellow); color: var(--saulstari-green); width: 100%; }
        .btn-success { background: var(--success); color: white; width: 100%; }
        .btn-res { background: white; color: var(--saulstari-green); border: 2px solid var(--saulstari-yellow); width: 100%; margin-top: 10px; }
        .btn-logout { background: transparent; color: #888; border: 1px solid #ddd; padding: 8px 15px; font-size: 0.8rem; margin-top: 20px; }

        #tableContainer { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: var(--white); 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        .table-responsive { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: var(--saulstari-green); color: white; padding: 15px; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.9rem; }
        
        .oil-text { color: #8d6e63; font-weight: bold; }
        .fuel-text { color: #1e88e5; font-weight: bold; }
        .active-row { color: var(--success); font-weight: bold; }

        /* Modal */
        #resourceModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 400px; 
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="welcome">Sveiki!</h2>
        <div id="status">Statuss: Gaidīšana</div>
        <div id="startTimeDisplay" style="margin-bottom: 15px;"></div>

        <div id="shiftControls">
            <button id="AtWork" class="btn-main">SĀKT DARBA DIENU</button>
            <button id="LeaveWork" class="btn-stop" style="display:none;">BEIGT DARBA DIENU</button>
        </div>

        <div id="workControls" style="margin-top: 20px; display: none;">
            <select id="car"><option value="">-- Izvēlies mašīnu --</option></select>
            <select id="object"><option value="">-- Izvēlies objektu --</option></select>
            <select id="work"><option value="">-- Izvēlies darba veidu --</option></select>
            
            <button id="startBtn" class="btn-success">Sākt darbu</button>
            <button id="stopBtn" class="btn-stop" style="display:none;">Beigt darbu</button>
            <button id="OpenResourceBtn" class="btn-res">🛢️ Reģistrēt Degvielu / Eļļu</button>
        </div>

        <button id="logoutBtn" class="btn-logout">Izrakstīties</button>
    </div>

    <div id="resourceModal">
        <div class="modal-content">
            <h3 style="margin-top:0; color: var(--saulstari-green);">Pievienot resursu</h3>
            <label>Ko Tu lej?</label>
            <select id="modalResourceSelect"><option value="">-- Izvēlies resursu --</option></select>
            <label>Kurā mašīnā?</label>
            <select id="modalCarSelect"></select>
            <label>Daudzums (Litri):</label>
            <input type="number" id="modalAmountInput" step="0.1" placeholder="Piemēram, 20.5">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button id="modalCancel" style="flex:1; background:#eee; color:#333;">Atcelt</button>
                <button id="modalSave" style="flex:1; background:var(--success); color:white;">Saglabāt</button>
            </div>
        </div>
    </div>

    <h3 style="text-align: center; color: var(--saulstari-green);">Tavi pēdējie ieraksti:</h3>
    <div id="tableContainer" class="table-responsive"></div>

<script>
    // --- AUTORIZĀCIJA ---
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user) { window.location.href = "index.html"; }
    document.getElementById("welcome").textContent = `Darbinieks: ${user.name}`;

    // --- ELEMENTI ---
    const carSelect = document.getElementById("car");
    const objectSelect = document.getElementById("object");
    const workSelect = document.getElementById("work");
    const tableContainer = document.getElementById("tableContainer");

    // --- DATU IELĀDE ---
    async function loadWorkerData() {
        try {
            const [cars, objects, workTypes, allSchedule, resources] = await Promise.all([
                fetch('/api/cars').then(r => r.json()).catch(() => []),
                fetch('/api/objects').then(r => r.json()).catch(() => []),
                fetch('/api/work-types').then(r => r.json()).catch(() => []),
                fetch('/api/schedule').then(r => r.json()).catch(() => []),
                fetch('/api/resource-types').then(r => r.json()).catch(() => [])
            ]);

            // Aizpilda sarakstus
            fillSelect(carSelect, cars, "-- Izvēlies mašīnu --");
            fillSelect(objectSelect, objects, "-- Izvēlies objektu --");
            fillSelect(workSelect, workTypes, "-- Izvēlies darba veidu --");

            // Noliktavas saraksts modālā
            const resModalSelect = document.getElementById("modalResourceSelect");
            resModalSelect.innerHTML = '<option value="">-- Ko Tu lej? --</option>' + 
                resources.map(r => `<option value="${r.id}">${r.name} (${r.quantity}L)</option>`).join("");

            updateUIStatus(allSchedule);
        } catch (err) {
            console.error("Kļūda ielādējot datus:", err);
        }
    }

    function fillSelect(el, data, defText) {
        const current = el.value;
        el.innerHTML = `<option value="">${defText}</option>`;
        data.forEach(item => {
            const val = typeof item === 'object' ? (item.name || item.id) : item;
            el.innerHTML += `<option value="${val}">${val}</option>`;
        });
        el.value = current;
    }

    // --- UI STĀVOKĻA VADĪBA ---
    function updateUIStatus(allSchedule) {
        const isShiftStarted = !!localStorage.getItem(`shift_start_${user.name}`);
        const activeJob = allSchedule.find(e => e.worker_name === user.name && !e.beigu_laiks);

        const statusEl = document.getElementById("status");
        const workControls = document.getElementById("workControls");
        const atWorkBtn = document.getElementById("AtWork");
        const leaveBtn = document.getElementById("LeaveWork");
        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");

        // Maiņas loģika
        atWorkBtn.style.display = isShiftStarted ? "none" : "block";
        leaveBtn.style.display = (isShiftStarted && !activeJob) ? "block" : "none";
        workControls.style.display = isShiftStarted ? "block" : "none";

        if (activeJob) {
            statusEl.innerHTML = `Strādā: <b style="color:var(--success)">${activeJob.objekts}</b>`;
            startBtn.style.display = "none";
            stopBtn.style.display = "block";
            [carSelect, objectSelect, workSelect].forEach(s => s.disabled = true);
            carSelect.value = activeJob.car;
            objectSelect.value = activeJob.objekts;
            workSelect.value = activeJob.darbs;
        } else {
            statusEl.textContent = isShiftStarted ? "Maiņa sākta" : "Gaidīšana";
            startBtn.style.display = "block";
            stopBtn.style.display = "none";
            [carSelect, objectSelect, workSelect].forEach(s => s.disabled = false);
        }

        renderTable(allSchedule.filter(e => e.worker_name === user.name));
    }

    // --- DARBĪBAS ---
    document.getElementById("AtWork").onclick = () => {
        localStorage.setItem(`shift_start_${user.name}`, new Date().toISOString());
        loadWorkerData();
    };

    document.getElementById("LeaveWork").onclick = async () => {
        if (!confirm("Beigt darba dienu?")) return;
        const now = new Date();
        const start = localStorage.getItem(`shift_start_${user.name}`);
        const hours = start ? ((now - new Date(start)) / 3600000).toFixed(2) : 0;

        await fetch('/api/darba-stundas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                darbinieks: user.name,
                datums: now.toLocaleDateString('lv-LV'),
                stundas: parseFloat(hours),
                beidza: now.toLocaleTimeString('lv-LV')
            })
        });

        localStorage.removeItem(`shift_start_${user.name}`);
        location.reload();
    };

    document.getElementById("startBtn").onclick = async () => {
        if (!carSelect.value || !objectSelect.value) return alert("Izvēlies auto un objektu!");
        const now = new Date();
        await fetch('/api/start-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                worker_name: user.name, 
                car: carSelect.value, 
                objekts: objectSelect.value, 
                darbs: workSelect.value,
                start_time: now.toLocaleTimeString('lv-LV') 
            })
        });
        loadWorkerData();
    };

    document.getElementById("stopBtn").onclick = async () => {
        const now = new Date();
        await fetch('/api/stop-work', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ worker_name: user.name, end_time: now.toLocaleTimeString('lv-LV') })
        });
        loadWorkerData();
    };

    // --- RESURSU MODĀLS ---
    document.getElementById("OpenResourceBtn").onclick = () => {
        const mCar = document.getElementById("modalCarSelect");
        mCar.innerHTML = carSelect.innerHTML;
        mCar.value = carSelect.value;
        document.getElementById("resourceModal").style.display = "flex";
    };

    document.getElementById("modalCancel").onclick = () => { document.getElementById("resourceModal").style.display = "none"; };

    document.getElementById("modalSave").onclick = async () => {
        const id = document.getElementById("modalResourceSelect").value;
        const amount = parseFloat(document.getElementById("modalAmountInput").value);
        const car = document.getElementById("modalCarSelect").value;

        if (!id || !amount || !car) return alert("Aizpildi visus laukus!");

        try {
            await fetch(`/api/resource-types/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'sub', amount: amount })
            });
            
            await fetch('/api/update-resources', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ worker_name: user.name, car: car, amount: amount })
            });

            document.getElementById("resourceModal").style.display = "none";
            loadWorkerData();
        } catch (e) { alert("Kļūda saglabājot!"); }
    };

    // --- TABULA ---
    function renderTable(data) {
        if (!data.length) { tableContainer.innerHTML = "<p>Nav ierakstu.</p>"; return; }
        let html = `<table><tr><th>Auto</th><th>Objekts</th><th>Sākums</th><th>Beigas</th><th>Eļļa</th><th>Degv.</th></tr>`;
        
        data.slice().reverse().forEach(e => {
            const isActive = !e.beigu_laiks;
            html += `<tr class="${isActive ? 'active-row' : ''}">
                <td>${e.car}</td>
                <td>${e.objekts}</td>
                <td>${e.sākuma_laiks}</td>
                <td>${isActive ? 'STRĀDĀ' : e.beigu_laiks}</td>
                <td class="oil-text">${e.pielietā_eļļa || 0}L</td>
                <td class="fuel-text">${e.pielietā_degviela || 0}L</td>
            </tr>`;
        });
        tableContainer.innerHTML = html + "</table>";
    }

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("loggedInUser");
        location.href = "index.html";
    };

    loadWorkerData();
</script>
</body>
</html>
